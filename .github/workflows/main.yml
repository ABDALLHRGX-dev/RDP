name: RDP with Tailscale (Max Clean)

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Max Clean Disk
        run: |
          Stop-Service -Name wuauserv -Force -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Windows\SoftwareDistribution\Download" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Windows\Temp\*" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "$env:TEMP\*" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files (x86)\Microsoft Visual Studio" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\Microsoft Visual Studio" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\dotnet" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\hostedtoolcache" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\ProgramData\chocolatey" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Android" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\Android" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files (x86)\Android" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\Git" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\nodejs" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\Python*" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files (x86)\Microsoft SDKs" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\Microsoft SDKs" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files\Windows Kits" -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force "C:\Program Files (x86)\Windows Kits" -ErrorAction SilentlyContinue

      - name: Enable RDP & Disable NLA
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Lsa" -Name "LimitBlankPasswordUse" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
          Restart-Service TermService -Force

      - name: Create RDP User With Password
        run: |
          $password = ConvertTo-SecureString "Abc!2024!*1*1*1*" -AsPlainText -Force
          New-LocalUser "RDP" -Password $password -FullName "RDP User" -Description "GitHub Actions RDP" -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

      - name: Install Tailscale
        run: |
          $installDir = "C:\install"
          New-Item -Path $installDir -ItemType Directory -Force | Out-Null
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-1.96.3-amd64.msi"
          $file = "$installDir\tailscale.msi"
          Invoke-WebRequest -Uri $url -OutFile $file -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i", "`"$file`"", "/quiet", "/norestart" -Wait
          Remove-Item $file -Force -ErrorAction SilentlyContinue

      - name: Start Tailscale
        run: |
          $tailscaleExe = "$env:ProgramFiles\Tailscale\tailscale.exe"
          & $tailscaleExe up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-rdp-$env:GITHUB_RUN_ID
          $ip = ""
          for ($i = 0; $i -lt 15; $i++) {
            Start-Sleep -Seconds 6
            $ip = & $tailscaleExe ip -4
            if ($ip) { break }
          }
          if (-not $ip) { exit 1 }
          echo "RDP_IP=$ip" >> $env:GITHUB_ENV

      - name: Show Credentials
        run: |
          Write-Host "RDP Ready"
          Write-Host "IP: $env:RDP_IP"
          Write-Host "Username: RDP"
          Write-Host "Password: Abc!2024!*1*1*1*"
          while ($true) { Start-Sleep -Seconds 300 }
