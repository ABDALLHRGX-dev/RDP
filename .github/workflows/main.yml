name: RDP with Tailscale (Stable Clean)

on:
  workflow_dispatch:

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Install Tailscale
        run: |
          $url = "https://pkgs.tailscale.com/stable/tailscale-setup-1.96.3-amd64.msi"
          $file = "C:\tailscale.msi"
          Invoke-WebRequest $url -OutFile $file
          Start-Process msiexec.exe -ArgumentList "/i $file /quiet /norestart" -Wait
          Remove-Item $file -Force -ErrorAction SilentlyContinue

      - name: Start Tailscale
        run: |
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"
          & $ts up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-rdp-$env:GITHUB_RUN_ID

          for ($i=0; $i -lt 15; $i++) {
            Start-Sleep 5
            $ip = & $ts ip -4
            if ($ip) { break }
          }

          echo "RDP_IP=$ip" >> $env:GITHUB_ENV

      - name: Safe Universal Clean (NO ERRORS)
        shell: powershell
        run: |
          $paths = @(
            $env:TEMP,
            "C:\Windows\Temp",
            "C:\ProgramData\chocolatey\lib",
            "C:\hostedtoolcache",
            "C:\Program Files\dotnet",
            "C:\Program Files (x86)\Microsoft SDKs",
            "C:\Program Files\Microsoft SDKs"
          )

          foreach ($p in $paths) {
            if (Test-Path $p) {
              try {
                Remove-Item -Recurse -Force -Path $p -ErrorAction SilentlyContinue
              } catch {}
            }
          }

          [System.GC]::Collect()
          [System.GC]::WaitForPendingFinalizers()

      - name: Enable RDP & Disable NLA
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Lsa" -Name "LimitBlankPasswordUse" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389
          Restart-Service TermService -Force

      - name: Create RDP User
        run: |
          $password = ConvertTo-SecureString "Abc!2024!*1*1*1*" -AsPlainText -Force
          New-LocalUser "RDP" -Password $password -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

      - name: Show Info
        run: |
          Write-Host "IP: $env:RDP_IP"
          Write-Host "User: RDP"
          Write-Host "Pass: Abc!2024!*1*1*1*"
          while ($true) { Start-Sleep 300 }
